name: BatchAsh
options:
  bundleIdPrefix: com.shimondeitel.glazetestlog
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
  groupSortPosition: top
settings:
  base:
    MARKETING_VERSION: "1.0"
    CURRENT_PROJECT_VERSION: "1"
    SWIFT_VERSION: "5.0"
    DEVELOPMENT_TEAM: "W7Q885Q59C"
    CODE_SIGN_STYLE: Automatic
    IPHONEOS_DEPLOYMENT_TARGET: "17.0"
    TARGETED_DEVICE_FAMILY: "1"
    ENABLE_USER_SCRIPT_SANDBOXING: "YES"
targets:
  BatchAsh:
    type: application
    platform: iOS
    sources:
      - path: BatchAsh
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.glazetestlog
        TARGETED_DEVICE_FAMILY: "1"
        INFOPLIST_FILE: BatchAsh/Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        ENABLE_PREVIEWS: "YES"
        GENERATE_INFOPLIST_FILE: "NO"
  BatchAshTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: BatchAshTests
      - path: BatchAsh.storekit
    dependencies:
      - target: BatchAsh
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.glazetestlog.tests
        GENERATE_INFOPLIST_FILE: "YES"
        TARGETED_DEVICE_FAMILY: "1"
  BatchAshUITests:
    type: bundle.ui-testing
    platform: iOS
    sources:
      - path: BatchAshUITests
    dependencies:
      - target: BatchAsh
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.glazetestlog.uitests
        GENERATE_INFOPLIST_FILE: "YES"
        TARGETED_DEVICE_FAMILY: "1"
schemes:
  BatchAsh:
    build:
      targets:
        BatchAsh: all
        BatchAshTests: [test]
        BatchAshUITests: [test]
    run:
      config: Debug
      storeKitConfiguration: BatchAsh.storekit
    test:
      config: Debug
      storeKitConfiguration: BatchAsh.storekit
      targets:
        - BatchAshTests
        - BatchAshUITests
    archive:
      config: Release
